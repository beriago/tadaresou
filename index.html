function generateRace() {
const rand = Math.random();
let count = rand < 0.35 ? 1 : rand < 0.90 ? 2 : 3;

  const shuffled = [...races].sort(() => 0.5 - Math.random());
  const selected = shuffled.slice(0, count);

  return selected.join(" × ");
}


function generateAbility() {

  const rand = Math.random();

  let count =
    rand < 0.60 ? 1 :
    rand < 0.90 ? 2 :
    3;

  const shuffled =
    [...abilities].sort(() => 0.5 - Math.random());

  return shuffled.slice(0, count);
}


const aptitudeLabels = ["筋力","知力","俊敏","精神","社交性","能力"];
const aptitudeRanks = [
  ["SSS",3],
  ["SS",12],
  ["S",16],
  ["A",16],
  ["B",16],
  ["C",16],
  ["D",16],
  ["E",12],
  ["F",1]
];

function getWeightedRank() {
  const total = aptitudeRanks.reduce((s, r) => s + r[1], 0);
  let roll = Math.random() * total;

  for (const [rank, weight] of aptitudeRanks) {
    roll -= weight;
    if (roll < 0) return rank;
  }
  return "B";
}

function generateAptitudes() {
  return aptitudeLabels
    .map(label => `${label}${getWeightedRank()}`)
    .join("　");
}

// カラー
function randomColor() {
  return "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}

function getBrightness(hex) {
  const r = parseInt(hex.substr(1,2),16);
  const g = parseInt(hex.substr(3,2),16);
  const b = parseInt(hex.substr(5,2),16);
  return (r*299 + g*587 + b*114)/1000;
}

function generateColorOptions() {
  const container = document.getElementById("colorOptions");
  container.innerHTML = "";

  currentColors = []; // ←追加（リセット）

  for(let i=0;i<3;i++){
    const color = randomColor();

    currentColors.push(color); // ←追加（保存）

    const btn = document.createElement("div");

    btn.innerHTML = `
    <svg viewBox="0 0 100 100" width="65" height="65">
      <path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
        fill="${color}"
        stroke="#000000"
        stroke-width="3"/>
    </svg>
    `;

    btn.style.cursor = "pointer";
    btn.onclick = () => applyColor(color);

    container.appendChild(btn);
  }
}

function generateHeartHTML() {

  let html = "";

  currentColors.forEach(color => {
    html += `
    <svg viewBox="0 0 100 100" width="60" height="60" style="margin:0;">
      <path d="M50 90 L20 60 A20 20 0 1 1 50 30 A20 20 0 1 1 80 60 Z"
        fill="${color}"
        stroke="#000"
        stroke-width="3"/>
    </svg>
    `;
  });

  return html;
}
